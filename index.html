<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Comic Relief Corner</title>

    <style>

body {

    margin: 0;

    display: flex;
    justify-content: center;
    align-items: flex-start;

    padding-top: 120px;

    min-height: 100vh;

    overflow: hidden;

    position: relative;

    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

    /* BLACK PAPER TEXTURE */

    background-color: #050505;

    background-image:

        radial-gradient(
            rgba(255,255,255,0.035) 1px,
            transparent 1px
        ),

        radial-gradient(
            rgba(255,255,255,0.02) 1px,
            transparent 1px
        ),

        linear-gradient(
            180deg,
            #0a0a0a,
            #050505
        );

    background-size:
        4px 4px,
        7px 7px,
        100% 100%;

    color: white;
}

        /* TOP SCROLLING BAR */

        .top-scroll {

            position: fixed;

            top: 0;
            left: 0;

            width: 100%;
            height: 50px;

            background: rgba(255,255,255,0.35);

            backdrop-filter: blur(6px);

            overflow: hidden;

            display: flex;
            align-items: center;

            border-bottom: 2px solid #ff5ca8;

            z-index: 999;
        }

.top-scroll span {

    white-space: nowrap;

    color: white;

    font-size: 24px;
    font-weight: bold;

    text-shadow:
        0 0 5px #ff69b4,
        0 0 10px #ff69b4,
        0 0 20px #ff1493;

    display: inline-block;

    padding-left: 0;

    animation: marquee 25s linear infinite;
}
@keyframes marquee {

    0% {

        transform: translateX(100%);
    }

    100% {

        transform: translateX(-100%);
    }
}

        /* MAIN CONTAINER */

        .container {

            text-align: center;

            padding: 20px;

            position: relative;

            z-index: 2;
        }

        /* TITLE */

        .glow-text {

            font-size: 82px;

            font-weight: bold;

            margin: 0;

            color: white;

            animation: pinkGlow 3s ease-in-out infinite;
        }

        @keyframes pinkGlow {

            0% {

                text-shadow:
                    0 0 5px #ff69b4,
                    0 0 10px #ff69b4,
                    0 0 20px #ff69b4,
                    0 0 40px #ff69b4;

                transform: translateY(0px);
            }

            50% {

                text-shadow:
                    0 0 10px #ff1493,
                    0 0 20px #ff1493,
                    0 0 40px #ff1493,
                    0 0 80px #ff1493;

                transform: translateY(-8px);
            }

            100% {

                text-shadow:
                    0 0 5px #ff69b4,
                    0 0 10px #ff69b4,
                    0 0 20px #ff69b4,
                    0 0 40px #ff69b4;

                transform: translateY(0px);
            }
        }

        /* AUTHOR */

        .author-text {

            font-size: 22px;

            font-weight: bold;

            color: white;

            margin-top: 15px;

            text-shadow:
                0 0 5px #ff69b4,
                0 0 15px #ff69b4;
        }

        /* SUBTEXT */

        .subtext {

            font-size: 18px;

            font-weight: bold;

            color: white;

            letter-spacing: 2px;

            margin-top: 10px;

            text-shadow:
                0 0 5px #ff69b4;
        }

        /* BUTTON */

        .start-button {

            display: inline-block;

            margin-top: 35px;

            padding: 16px 45px;

            font-size: 24px;

            font-weight: bold;

            color: white;

            background: linear-gradient(
                135deg,
                #ff69b4,
                #ff1493
            );

            border: none;

            border-radius: 50px;

            cursor: pointer;

            text-transform: uppercase;

            letter-spacing: 2px;

            text-decoration: none;

            box-shadow:
                0 0 10px #ff69b4,
                0 0 20px #ff69b4;

            transition: 0.3s;
        }

        .start-button:hover {

            transform: scale(1.08);

            box-shadow:
                0 0 20px #ff1493,
                0 0 40px #ff1493,
                0 0 70px #ff1493;
        }

        /* FLOATING PARTICLES */

        .particle {

            position: absolute;

            background-color: #ff69b4;

            border-radius: 50%;

            pointer-events: none;

            opacity: 0.8;

            filter: blur(1px);

            z-index: 1;

            animation: floatUp linear forwards;
        }

        @keyframes floatUp {

            from {

                transform: translateY(0);

                opacity: 0.8;
            }

            to {

                transform: translateY(-100vh);

                opacity: 0;
            }
        }

    </style>
</head>

<body>

<!-- TOP SCROLLING TEXT -->

<div class="top-scroll">

    <span id="scrollingText"></span>

</div>

<!-- MAIN CONTENT -->

<div class="container">

    <h1 class="glow-text">
        The Comic Relief Corner
    </h1>

    <p class="author-text">
        By Luna Murray
    </p>

    <p class="subtext">
        (Very fahhh)
    </p>

    <a class="start-button"
       href="https://sites.google.com/aacps.org/gamesunleashed/games"
       target="_blank">

        Games

    </a>

</div>

<script>

/* RANDOM SCROLLING TEXT */

const phrases = [

    "WELCOME TO THE COMIC RELIEF CORNER",
    "SILLY GAMES",
    "FAHHHH",
    "UNDERTALE IS PEAK",
    "CHAOS",
    "WHY AM I STILL CODING",
    "VERY PROFESSIONAL WEBSITE",
    "ABSOLUTE CINEMA",
    "NERD STUFF",
    "GO PLAY SOME GAMES",
    "TOTALLY NOT CRINGE",
    "BREAD 👍",
    "MY BRAIN IS MELTING",
    "RETRO VIBES",
    "LOUD INCORRECT BUZZER",
    "I LOVE CODEENG",
    "FROGS ARE COOL",
    "SKILL ISSUE",
    "W WEBSITE",
    "THE SILLY ZONE"

];

const scrollingText =
    document.getElementById("scrollingText");

function randomizeScrollingText() {

    let finalText = "";

    for(let i = 0; i < 12; i++) {

        const randomPhrase =
            phrases[Math.floor(Math.random() * phrases.length)];

        finalText += randomPhrase + " ✦ ";

    }

    scrollingText.textContent = finalText;
}

randomizeScrollingText();

/* CHANGE PHRASES EVERY LOOP */

setInterval(randomizeScrollingText, 18000);

/* FLOATING PARTICLES */

function createParticle() {

    const particle = document.createElement("div");

    particle.classList.add("particle");

    const size = Math.random() * 6 + 2;

    particle.style.width = size + "px";
    particle.style.height = size + "px";

    particle.style.left =
        Math.random() * window.innerWidth + "px";

    particle.style.top =
        (window.innerHeight + 10) + "px";

    const duration =
        Math.random() * 4 + 2;

    particle.style.animationDuration =
        duration + "s";

    document.body.appendChild(particle);

    setTimeout(() => {

        particle.remove();

    }, duration * 1000);
}

setInterval(createParticle, 80);

</script>

</body>
</html>
