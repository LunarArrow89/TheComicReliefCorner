<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Comic Relief Corner</title>

<style>

/* =========================
   BASE
========================= */

body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;

    background: #0b0b0f; /* deep soft base */
}

/* =========================
   PAPER TEXTURE LAYER
========================= */

.paper {
    position: fixed;
    inset: 0;
    z-index: -2;

    /* soft warm/dark paper tone */
    background: radial-gradient(
        circle at 20% 20%,
        #14141a,
        #0b0b0f 60%
    );
}

/* subtle fiber noise (this is the “real” paper feel) */
.paper::after {
    content: "";
    position: absolute;
    inset: 0;

    opacity: 0.08;
    pointer-events: none;

    background-image:
        url("https://www.transparenttextures.com/patterns/noise.png");

    /* IMPORTANT: makes it feel like real paper, not dots */
    mix-blend-mode: overlay;
}

/* =========================
   UI
========================= */

.container {
    position: relative;
    z-index: 2;
    text-align: center;
    margin-top: 18vh;
}

/* TITLE */
.glow-text {
    font-size: 80px;
    font-weight: bold;
    color: white;

    text-shadow:
        0 0 8px #ff69b4,
        0 0 18px #ff1493;
}

/* BUTTON */
.start-button {
    display: inline-block;
    margin-top: 30px;
    padding: 15px 40px;

    font-size: 22px;
    font-weight: bold;

    background: #ff1493;
    color: white;

    border-radius: 30px;
    text-decoration: none;

    box-shadow: 0 0 15px #ff69b4;
}

.start-button:hover {
    transform: scale(1.05);
}

</style>
</head>

<body>

<!-- PAPER BACKGROUND -->
<div class="paper"></div>

<!-- MAIN UI -->
<div class="container">
    <h1 class="glow-text">The Comic Relief Corner</h1>
    <a class="start-button" href="#">Games</a>
</div>

</body>
</html>
