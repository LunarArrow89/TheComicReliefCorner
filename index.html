<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Comic Relief Corner</title>

<style>

/* =========================
   PAGE BACKGROUND
========================= */

body {
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-top: 120px;
    min-height: 100vh;
    overflow: hidden;
    font-family: Arial, sans-serif;

    background-color: #050505;

    /* “paper noise” texture */
    background-image:
        radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);

    background-size: 4px 4px, 8px 8px;
}

/* =========================
   TOP SCROLL BAR
========================= */

.top-scroll {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 50px;

    background: rgba(0,0,0,0.6);
    border-bottom: 2px solid #ff5ca8;

    overflow: hidden;
    display: flex;
    align-items: center;
}

.top-scroll span {
    white-space: nowrap;
    display: inline-block;

    color: white;
    font-size: 24px;
    font-weight: bold;

    text-shadow: 0 0 10px #ff69b4;

    animation: marquee 20s linear infinite;
}

/* IMPORTANT: infinite scroll movement */
@keyframes marquee {
    0% {
        transform: translateX(100%);
    }
    100% {
        transform: translateX(-100%);
    }
}

/* =========================
   MAIN CONTENT
========================= */

.container {
    text-align: center;
    z-index: 2;
}

.glow-text {
    font-size: 80px;
    font-weight: bold;
    color: white;

    text-shadow:
        0 0 5px #ff69b4,
        0 0 15px #ff1493,
        0 0 30px #ff69b4;

    animation: float 3s ease-in-out infinite;
}

/* floating effect */
@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
}

/* BUTTON */
.start-button {
    margin-top: 30px;
    padding: 15px 40px;
    font-size: 22px;

    background: #ff1493;
    color: white;
    border-radius: 30px;
    text-decoration: none;

    box-shadow: 0 0 20px #ff69b4;
}

.start-button:hover {
    transform: scale(1.05);
}

/* PARTICLES */
.particle {
    position: absolute;
    background: #ff69b4;
    border-radius: 50%;
    pointer-events: none;
    animation: fall linear;
}

@keyframes fall {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(-100vh); opacity: 0; }
}

</style>
</head>

<body>

<!-- TOP SCROLL -->
<div class="top-scroll">
    <span id="scrollingText"></span>
</div>

<!-- MAIN -->
<div class="container">

    <h1 class="glow-text">
        The Comic Relief Corner
    </h1>

    <a class="start-button" href="#">
        Games
    </a>

</div>

<script>

/* =========================
   RANDOM SCROLL TEXT ENGINE
========================= */

const phrases = [
    "WELCOME TO THE COMIC RELIEF CORNER",
    "UNDERTALE IS PEAK",
    "FAHHHH",
    "CHAOS MODE",
    "NERD ZONE",
    "SKILL ISSUE",
    "BREAD 👍",
    "ABSOLUTE CINEMA",
    "GO PLAY GAMES"
];

const scrollingText = document.getElementById("scrollingText");

function updateScroll() {
    let text = "";

    for (let i = 0; i < 10; i++) {
        let pick = phrases[Math.floor(Math.random() * phrases.length)];
        text += pick + " ✦ ";
    }

    scrollingText.textContent = text;
}

/* start immediately */
updateScroll();

/* keep updating forever */
setInterval(updateScroll, 8000);


/* =========================
   SIMPLE PARTICLES
========================= */

function spawnParticle() {
    const p = document.createElement("div");
    p.className = "particle";

    let size = Math.random() * 5 + 2;

    p.style.width = size + "px";
    p.style.height = size + "px";

    p.style.left = Math.random() * window.innerWidth + "px";
    p.style.top = window.innerHeight + "px";

    p.style.animationDuration = (Math.random() * 3 + 2) + "s";

    document.body.appendChild(p);

    setTimeout(() => p.remove(), 5000);
}

setInterval(spawnParticle, 100);

</script>

</body>
</html>
