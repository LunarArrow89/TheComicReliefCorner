<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games Unleashed</title>

    <style>
        body {
            background-color: #000;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 50px;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .container {
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            position: relative;
            z-index: 2;
        }

        /* TITLE */
        .glow-text {
            font-size: 72px;
            font-weight: bold;
            color: #fff;
            margin: 0;
            animation: glowFade 2.5s ease-in-out infinite;
        }

        @keyframes glowFade {
            0% {
                opacity: 1;
                text-shadow:
                    0 0 5px #2E2EFF,
                    0 0 10px #2E2EFF,
                    0 0 20px #2E2EFF,
                    0 0 40px #2E2EFF,
                    0 0 80px #2E2EFF;
            }

            50% {
                opacity: 0.4;
                text-shadow:
                    0 0 2px #2E2EFF,
                    0 0 5px #2E2EFF,
                    0 0 10px #2E2EFF;
            }

            100% {
                opacity: 1;
                text-shadow:
                    0 0 5px #2E2EFF,
                    0 0 10px #2E2EFF,
                    0 0 20px #2E2EFF,
                    0 0 40px #2E2EFF,
                    0 0 80px #2E2EFF;
            }
        }

        /* TYPING TEXT */
        .typing {
            font-size: 22px;
            font-weight: bold;
            color: #ddd;
            margin-top: 10px;
            letter-spacing: 2px;
            display: inline-block;
            border-right: 2px solid #2E2EFF;
            white-space: nowrap;
            overflow: hidden;
            text-shadow: 0 0 5px #2E2EFF;
            min-height: 28px;
            height: 28px;
        }

        .author-text {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            margin: 10px 0 0 0;
            text-shadow: 0 0 5px #2E2EFF;
        }

        .subtext {
            font-size: 18px;
            font-weight: bold;
            color: #ddd;
            margin-top: 10px;
            letter-spacing: 2px;
        }

        /* PARTICLES FIXED */
        .particle {
            position: absolute;
            background-color: #2E2EFF;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.8;
            filter: blur(1px);
            z-index: 1;

            animation: floatUp linear forwards;
        }

        @keyframes floatUp {
            from {
                transform: translateY(0);
                opacity: 0.8;
            }

            to {
                transform: translateY(-100vh);
                opacity: 0;
            }
        }

        /* BUTTON */
        .start-button {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            background-color: #000;
            border: 2px solid #2E2EFF;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: none;
            box-shadow: 0 0 10px #2E2EFF;
            transition: 0.3s;
        }

        .start-button:hover {
            box-shadow: 0 0 30px #2E2EFF;
            transform: scale(1.05);
        }

        /* SONG BOX */
        .song-box {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 999;
            background: rgba(0,0,0,0.75);
            border: 1px solid #2E2EFF;
            padding: 8px;
            border-radius: 8px;
            color: white;
            width: 190px;
            box-shadow: 0 0 8px #2E2EFF;
            font-family: Arial;
            font-size: 11px;
        }

        .song-title {
            font-size: 14px;
            margin-bottom: 6px;
            color: #ddd;
            overflow: hidden;
            white-space: nowrap;
            position: relative;
        }

        .song-title span {
            display: inline-block;
            padding-left: 100%;
            animation: scrollText 10s linear infinite;
        }

        @keyframes scrollText {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-100%);
            }
        }

        .music-circle {
    width: 70px;
    height: 70px;
    margin: 10px auto;
    border-radius: 50%;
    border: 3px solid #2E2EFF;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;

    /* REAL GLOW */
    box-shadow:
        0 0 10px #2E2EFF,
        0 0 20px #2E2EFF,
        inset 0 0 10px #2E2EFF;

    transition: 0.3s;
}

.music-circle:hover {
    transform: scale(1.1);

    box-shadow:
        0 0 15px #2E2EFF,
        0 0 30px #2E2EFF,
        0 0 60px #2E2EFF,
        inset 0 0 10px #2E2EFF;
}

        .inner-circle {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: #2E2EFF;
        }
    </style>
</head>

<body>

<div class="song-box">

    <div class="song-title">
        <span>🎵 Song of the Week: Battling Strongish Monsters</span>
    </div>

    <div class="music-circle" onclick="toggleSong()">
        <div class="inner-circle"></div>
    </div>

</div>

<div class="container">

    <h1 class="glow-text">Games Unleashed</h1>

    <p id="typing" class="typing"></p>

    <p class="author-text">By luna murray</p>
    <p class="subtext">(Very fahhh)</p>

    <a class="start-button" href="https://sites.google.com/aacps.org/gamesunleashed/games" target="_blank">
        Games
    </a>

</div>

<script>

let musicWindow = null;

function toggleSong() {
    const url =
        "https://drive.google.com/file/d/1ah-cbKMMGGO8PXcy--8YXnBJy1d1owGs/preview";

    if (!musicWindow || musicWindow.closed) {
        musicWindow = window.open(url, "MusicPlayer", "width=300,height=120");
    } else {
        musicWindow.close();
        musicWindow = null;
    }
}

/* ===================== */
/* TYPING FIXED          */
/* ===================== */

const messages = [
"https://youtube.com",
"Too cool for skewl (Whoops I spelled 'school' wrong)",
"GAY FROGS",

"Me and my boi playing Brotato",

"I could start a cult >:D",
"Want a movie? Recommend it via the google form!",
"Have you watched adventure time yet?",
"Hey! No cussing in the chatroom!",

"AHH MY FOOT FELL ASLEEP~",

"IT'S CAINE THE TEETH-MAN",
"RAHHHHHHHH",
"I luv codeeng",
"My brain stopped braining in 3rd grade",

"GO TO SLEEP!!",
"My code looks so messy rn...",
"Thug life B-)",

"Trump is an orange Cheeto puff",

"THICC",
"SIX SEVEN SIX SEVEN",
"Inspired by Frogies Arcade",
"Logan was the first to attempt to curse in the chatroom. Frick Logan",

"Jimmy is a bully. Don't be Jimmy",

"When you [Insert relatable thing here]",
"I dO nOt FeAR DeatH, FoR i Am DeaTH!!!11!",
"Hey, look! A cool little easter egg!",
"Search for the hidden games!",
"Hm... seems like math homework to me!",
"Amongus",

"New games added daily!",
"Blud thought this was canvas",
"Enter the arcade.",
"Skibidi rizz",
"Don't get caught!",
"Sybau  🥀💔✌️",
"Tiff = Tuff",
"UwU me iz cute",
"ULTRA CRINGE",
"Who you looking at?! >:("
];

let charIndex = 0;
let isDeleting = false;
let currentMessage = "";
let lastMessage = "";

function pickRandomMessage() {
    let msg;
    do {
        msg = messages[Math.floor(Math.random() * messages.length)];
    } while (msg === lastMessage);

    lastMessage = msg;
    return msg;
}

function type() {
    const display = document.getElementById("typing");

    if (!currentMessage) {
        currentMessage = pickRandomMessage();
    }

    if (!isDeleting) {

        display.innerHTML = currentMessage.substring(0, charIndex);
        charIndex++;

        if (charIndex > currentMessage.length) {
            isDeleting = true;
            setTimeout(type, 1200);
            return;
        }

    } else {

        display.innerHTML = currentMessage.substring(0, charIndex);
        charIndex--;

        if (charIndex < 0) {
            isDeleting = false;
            currentMessage = pickRandomMessage();
            charIndex = 0;
        }
    }

    setTimeout(type, isDeleting ? 50 : 90);
}

type();

/* ===================== */
/* PARTICLES FIXED      */
/* ===================== */

function createParticle() {

    const particle = document.createElement("div");
    particle.classList.add("particle");

    const size = Math.random() * 6 + 2;

    particle.style.width = size + "px";
    particle.style.height = size + "px";

    particle.style.left = Math.random() * window.innerWidth + "px";
    particle.style.top = (window.innerHeight + 10) + "px";

    const duration = Math.random() * 4 + 2;

    particle.style.animationDuration = duration + "s";

    document.body.appendChild(particle);

    setTimeout(() => {
        particle.remove();
    }, duration * 1000);
}

setInterval(createParticle, 80);

</script>

</body>
</html>
