<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Comic Relief Corner</title>

<style>

/* =========================
   BASE BACKGROUND (DARK + RED GLOW)
========================= */

body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;

    background: #0b0b0b;
    font-family: Arial, sans-serif;
}

/* subtle grain texture */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;

    background-image:
        radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);

    background-size: 3px 3px;
    opacity: 0.15;
}

/* red glow area (top-right vibe from image) */
.glow {
    position: fixed;
    top: -200px;
    right: -200px;
    width: 600px;
    height: 600px;

    background: radial-gradient(circle,
        rgba(255, 60, 60, 0.35),
        transparent 60%
    );

    filter: blur(40px);
}

/* =========================
   CENTER UI
========================= */

.container {
    text-align: center;
    z-index: 2;
}

/* TITLE */
.title {
    font-size: 80px;
    font-weight: bold;
    color: #ff4d6d;

    text-shadow:
        0 0 10px rgba(255, 77, 109, 0.6),
        0 0 25px rgba(255, 77, 109, 0.4);
}

/* BUTTON */
.button {
    display: inline-block;
    margin-top: 25px;

    padding: 12px 40px;
    font-size: 18px;
    letter-spacing: 3px;

    color: white;
    text-decoration: none;

    border: 2px solid #ff4d6d;
    border-radius: 999px;

    box-shadow:
        0 0 10px rgba(255, 77, 109, 0.4);

    transition: 0.3s;
}

.button:hover {
    transform: scale(1.05);
    box-shadow:
        0 0 20px rgba(255, 77, 109, 0.7);
}

</style>
</head>

<body>

<div class="glow"></div>

<div class="container">
    <div class="title">The Comic Relief Corner</div>
    <a class="button" href="#">GAMES</a>
</div>

</body>
</html>
