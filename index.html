<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Comic Relief Corner</title>

<style>

/* =========================
   BACKGROUND (BLACK PAPER)
========================= */

body {
    margin: 0;
    min-height: 100vh;
    overflow: hidden;
    font-family: Arial, sans-serif;

    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-top: 120px;

    background-color: #050505;

    background-image:
        radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);

    background-size: 4px 4px, 8px 8px;
}

/* =========================
   TOP SCROLL BAR
========================= */

.top-scroll {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 50px;

    background: rgba(0,0,0,0.7);
    border-bottom: 2px solid #ff5ca8;

    overflow: hidden;
    display: flex;
    align-items: center;
}

/* moving track (KEY FIX) */
.scroll-track {
    display: flex;
    width: max-content;
    animation: scrollLeft 18s linear infinite;
}

/* text style */
.scroll-track span {
    white-space: nowrap;

    font-size: 24px;
    font-weight: bold;
    color: white;

    padding-right: 80px;

    text-shadow:
        0 0 5px #ff69b4,
        0 0 10px #ff1493;
}

/* smooth endless loop */
@keyframes scrollLeft {
    0% {
        transform: translateX(0);
    }
    100% {
        transform: translateX(-50%);
    }
}

/* =========================
   MAIN CONTENT
========================= */

.container {
    text-align: center;
}

.glow-text {
    font-size: 80px;
    font-weight: bold;
    color: white;

    text-shadow:
        0 0 10px #ff69b4,
        0 0 20px #ff1493,
        0 0 40px #ff69b4;
}

/* button */
.start-button {
    display: inline-block;
    margin-top: 30px;
    padding: 15px 40px;

    font-size: 22px;
    font-weight: bold;

    background: #ff1493;
    color: white;

    border-radius: 30px;
    text-decoration: none;

    box-shadow: 0 0 20px #ff69b4;
}

.start-button:hover {
    transform: scale(1.05);
}

</style>
</head>

<body>

<!-- TOP SCROLL -->
<div class="top-scroll">
    <div class="scroll-track">
        <span id="scrollingText"></span>
        <span id="scrollingText2"></span>
    </div>
</div>

<!-- MAIN -->
<div class="container">

    <h1 class="glow-text">
        The Comic Relief Corner
    </h1>

    <a class="start-button" href="#">
        Games
    </a>

</div>

<script>

/* =========================
   RANDOM PHRASES
========================= */

const phrases = [
    "WELCOME TO THE COMIC RELIEF CORNER",
    "UNDERTALE IS PEAK",
    "FAHHHH",
    "CHAOS MODE",
    "NERD ZONE",
    "SKILL ISSUE",
    "BREAD 👍",
    "ABSOLUTE CINEMA",
    "GO PLAY GAMES",
    "THIS IS FINE 🔥",
    "MEME ENERGY",
    "LOW QUALITY HUMOR"
];

/* build long random string */
function buildText() {
    let text = "";

    for (let i = 0; i < 25; i++) {
        text += phrases[Math.floor(Math.random() * phrases.length)] + " ✦ ";
    }

    return text;
}

/* put SAME text in both spans (for seamless loop) */
const text = buildText();

document.getElementById("scrollingText").textContent = text;
document.getElementById("scrollingText2").textContent = text;

</script>

</body>
</html>
