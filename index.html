<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout Template</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            background-color: #f5f5f5;
        }

        /* Left Sidebar Navigation */
        aside {
            width: 220px;
            background-color: #ffffff;
            border-right: 2px solid #333;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            text-decoration: none;
            color: #333;
            font-weight: bold;
            border-radius: 5px;
            transition: background 0.2s;
        }

        .nav-item:hover {
            background-color: #e0e0e0;
        }

        .nav-item .img-placeholder {
            width: 24px;
            height: 24px;
            background-color: #ccc;
            border-radius: 4px;
        }

        /* Main Content Container Area */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* Top Header Container */
        header {
            background-color: #ffffff;
            border-bottom: 2px solid #333;
            padding: 10px 20px;
        }

        /* Scrolling Text Banner */
        .ticker-wrap {
            width: 100%;
            overflow: hidden;
            background-color: #eee;
            padding: 4px 0;
            margin-bottom: 10px;
        }

        .ticker {
            display: inline-block;
            white-space: nowrap;
            animation: marquee 15s linear infinite;
        }

        @keyframes marquee {
            0% { transform: translate3d(100%, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        /* Meta Row: Time/Date and Buttons */
        .meta-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .datetime {
            font-size: 14px;
            font-weight: bold;
            color: #444;
        }

        .button-group {
            display: flex;
            gap: 8px;
        }

        .square-btn {
            width: 40px;
            height: 40px;
            background-color: #ddd;
            border: 1px solid #999;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .square-btn:hover {
            background-color: #ccc;
        }

        /* Center Content Body */
        .content-body {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
        }

        .content-body h1 {
            font-size: 4rem;
            color: #111;
        }
    </style>
</head>
<body>

    <!-- Left Sidebar Navigation -->
    <aside>
        <a href="#" class="nav-item">
            <div class="img-placeholder"></div>
            <span>Home</span>
        </a>
        <a href="#" class="nav-item">
            <div class="img-placeholder"></div>
            <span>Games</span>
        </a>
        <a href="#" class="nav-item">
            <div class="img-placeholder"></div>
            <span>Movies</span>
        </a>
        <a href="#" class="nav-item">
            <div class="img-placeholder"></div>
            <span>Chatroom</span>
        </a>
        <a href="#" class="nav-item">
            <div class="img-placeholder"></div>
            <span>Creators</span>
        </a>
    </aside>

    <!-- Main Content Area -->
    <main>
        <!-- Top Header Area -->
        <header>
            <!-- Scrolling Text -->
            <div class="ticker-wrap">
                <div class="ticker">
                    Breaking News: Welcome to the new platform interface! Stay tuned for more updates.
                </div>
            </div>
            
            <!-- Time/Date and Square Action Buttons -->
            <div class="meta-row">
                <div class="datetime" id="live-clock">Loading Time...</div>
                <div class="button-group">
                    <button class="square-btn" title="Button 1">■</button>
                    <button class="square-btn" title="Button 2">■</button>
                    <button class="square-btn" title="Button 3">■</button>
                    <button class="square-btn" title="Button 4">■</button>
                </div>
            </div>
        </header>

        <!-- Main Center Display -->
        <section class="content-body">
            <h1>Home</h1>
        </section>
    </main>

    <!-- Optional JavaScript for a Real-Time Clock -->
    <script>
        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const dateStr = now.toLocaleDateString();
            document.getElementById('live-clock').textContent = `${timeStr} | ${dateStr}`;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
