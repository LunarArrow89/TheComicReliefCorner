<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Comic Relief Corner</title>

<style>

/* =========================
   BACKGROUND (BLACK PAPER)
========================= */

body {
    margin: 0;
    min-height: 100vh;
    overflow: hidden;
    font-family: Arial, sans-serif;

    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-top: 120px;

    background-color: #050505;

    background-image:
        radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);

    background-size: 4px 4px, 8px 8px;
}

/* =========================
   TOP SCROLL (FIXED + SMOOTH)
========================= */

.top-scroll {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 50px;

    background: rgba(0,0,0,0.75);
    border-bottom: 2px solid #ff5ca8;

    overflow: hidden;
    display: flex;
    align-items: center;
}

/* wrapper that moves */
.scroll-wrapper {
    display: flex;
    width: max-content;
}

/* each text strip */
.track {
    white-space: nowrap;

    font-size: 24px;
    font-weight: bold;
    color: white;

    padding-right: 60px;

    text-shadow:
        0 0 5px #ff69b4,
        0 0 10px #ff1493;

    animation: scrollLeft 18s linear infinite;
}

/* smooth movement (NO glitch) */
@keyframes scrollLeft {
    from {
        transform: translateX(0);
    }
    to {
        transform: translateX(-100%);
    }
}

/* =========================
   MAIN CONTENT
========================= */

.container {
    text-align: center;
}

.glow-text {
    font-size: 80px;
    font-weight: bold;
    color: white;

    text-shadow:
        0 0 10px #ff69b4,
        0 0 20px #ff1493,
        0 0 40px #ff69b4;
}

.start-button {
    display: inline-block;
    margin-top: 30px;
    padding: 15px 40px;

    font-size: 22px;
    font-weight: bold;

    background: #ff1493;
    color: white;

    border-radius: 30px;
    text-decoration: none;

    box-shadow: 0 0 20px #ff69b4;
}

.start-button:hover {
    transform: scale(1.05);
}

/* =========================
   PARTICLES
========================= */

.particle {
    position: absolute;
    background: #ff69b4;
    border-radius: 50%;
    pointer-events: none;
    animation: fall linear;
}

@keyframes fall {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(-100vh); opacity: 0; }
}

</style>
</head>

<body>

<!-- TOP SCROLL -->
<div class="top-scroll">
    <div class="scroll-wrapper">
        <div class="track" id="track"></div>
        <div class="track" id="track2"></div>
    </div>
</div>

<!-- MAIN -->
<div class="container">

    <h1 class="glow-text">
        The Comic Relief Corner
    </h1>

    <a class="start-button" href="#">
        Games
    </a>

</div>

<script>

/* =========================
   RANDOM SCROLL TEXT
========================= */

const phrases = [
    "WELCOME TO THE COMIC RELIEF CORNER",
    "UNDERTALE IS PEAK",
    "FAHHHH",
    "CHAOS MODE",
    "NERD ZONE",
    "SKILL ISSUE",
    "BREAD 👍",
    "ABSOLUTE CINEMA",
    "GO PLAY GAMES",
    "MEME ENERGY",
    "THIS IS FINE 🔥",
    "WHY AM I CODING THIS",
    "LOW QUALITY HUMOR"
];

function buildText() {
    let text = "";

    for (let i = 0; i < 25; i++) {
        text += phrases[Math.floor(Math.random() * phrases.length)] + " ✦ ";
    }

    return text;
}

/* same text in both tracks = seamless loop */
const text = buildText();

document.getElementById("track").textContent = text;
document.getElementById("track2").textContent = text;

/* =========================
   PARTICLES (OPTIONAL)
========================= */

function spawnParticle() {

    const p = document.createElement("div");

    p.className = "particle";

    let size = Math.random() * 5 + 2;

    p.style.width = size + "px";
    p.style.height = size + "px";

    p.style.left = Math.random() * window.innerWidth + "px";
    p.style.top = window.innerHeight + "px";

    p.style.animationDuration = (Math.random() * 3 + 2) + "s";

    document.body.appendChild(p);

    setTimeout(() => p.remove(), 5000);
}

setInterval(spawnParticle, 120);

</script>

</body>
</html>
