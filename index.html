<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Comic Relief Corner</title>

<style>

/* =========================
   CALM BACKGROUND
========================= */

body {
    margin: 0;
    overflow: hidden;
    background: #050505;
    font-family: Arial, sans-serif;
}

/* canvas behind everything */
#matrix {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
}

/* =========================
   MAIN UI
========================= */

.container {
    position: relative;
    z-index: 2;
    text-align: center;
    margin-top: 18vh;
}

/* STATIC TITLE */
.glow-text {
    font-size: 80px;
    font-weight: bold;
    color: white;

    text-shadow:
        0 0 8px #ff69b4,
        0 0 18px #ff1493;
}

/* BUTTON */
.start-button {
    display: inline-block;
    margin-top: 30px;
    padding: 15px 40px;

    font-size: 22px;
    font-weight: bold;

    background: #ff1493;
    color: white;

    border-radius: 30px;
    text-decoration: none;

    box-shadow: 0 0 15px #ff69b4;
}

.start-button:hover {
    transform: scale(1.05);
}

</style>
</head>

<body>

<!-- BACKGROUND CANVAS -->
<canvas id="matrix"></canvas>

<!-- MAIN CONTENT -->
<div class="container">

    <h1 class="glow-text">
        The Comic Relief Corner
    </h1>

    <a class="start-button" href="#">
        Games
    </a>

</div>

<script>

/* =========================
   RELAXED PINK RAIN SYSTEM
========================= */

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* soft characters only */
const chars = "abcdefghijklmnopqrstuvwxyz0123456789".split("");

const fontSize = 18;
const columns = Math.floor(canvas.width / fontSize);

/* each column starts randomly */
const drops = Array(columns)
    .fill(0)
    .map(() => Math.random() * canvas.height);

function draw() {

    /* soft fade (controls trail strength) */
    ctx.fillStyle = "rgba(0, 0, 0, 0.12)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    /* soft pink color */
    ctx.fillStyle = "#ff6fd8";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {

        const char = chars[Math.floor(Math.random() * chars.length)];

        const x = i * fontSize;
        const y = drops[i];

        ctx.fillText(char, x, y);

        /* slow falling speed */
        drops[i] += 1.2;

        /* reset gently */
        if (drops[i] > canvas.height && Math.random() > 0.98) {
            drops[i] = 0;
        }
    }
}

/* smooth animation loop */
setInterval(draw, 50);

/* resize support */
window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

</script>

</body>
</html>
