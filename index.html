<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games Unleashed</title>

    <style>

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 120px;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            /* PAPER TEXTURE */
            background-color: #ffd6ea;

            background-image:
                radial-gradient(circle at 20% 20%, rgba(255,255,255,0.4) 1px, transparent 2px),
                radial-gradient(circle at 80% 40%, rgba(255,255,255,0.25) 1px, transparent 2px),
                radial-gradient(circle at 40% 80%, rgba(255,255,255,0.3) 1px, transparent 2px),
                linear-gradient(
                    180deg,
                    #ffd6ea,
                    #ffc0dd
                );

            background-size:
                120px 120px,
                180px 180px,
                140px 140px,
                100% 100%;
        }

        /* TOP SCROLLING BAR */

        .top-scroll {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;

            background: rgba(255,255,255,0.35);

            backdrop-filter: blur(6px);

            overflow: hidden;

            display: flex;
            align-items: center;

            border-bottom: 2px solid #ff5ca8;

            z-index: 999;
        }

        .top-scroll span {

            white-space: nowrap;

            color: #ff1493;

            font-size: 24px;
            font-weight: bold;

            text-shadow:
                0 0 5px #ff8fc7,
                0 0 10px #ff8fc7;

            padding-left: 100%;

            animation: marquee 18s linear infinite;
        }

        @keyframes marquee {

            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-100%);
            }
        }

        .container {
            text-align: center;
            padding: 20px;
            position: relative;
            z-index: 2;
        }

        /* TITLE */

        .glow-text {

            font-size: 80px;
            font-weight: bold;

            margin: 0;

            color: #ff1493;

            animation: pinkGlow 3s ease-in-out infinite;
        }

        @keyframes pinkGlow {

            0% {

                text-shadow:
                    0 0 5px #ff69b4,
                    0 0 10px #ff69b4,
                    0 0 20px #ff69b4,
                    0 0 40px #ff69b4;

                transform: translateY(0px);
            }

            50% {

                text-shadow:
                    0 0 10px #ff1493,
                    0 0 20px #ff1493,
                    0 0 40px #ff1493,
                    0 0 70px #ff1493;

                transform: translateY(-8px);
            }

            100% {

                text-shadow:
                    0 0 5px #ff69b4,
                    0 0 10px #ff69b4,
                    0 0 20px #ff69b4,
                    0 0 40px #ff69b4;

                transform: translateY(0px);
            }
        }

        .author-text {

            font-size: 22px;
            font-weight: bold;

            color: white;

            margin-top: 15px;

            text-shadow:
                0 0 5px #ff69b4,
                0 0 15px #ff69b4;
        }

        .subtext {

            font-size: 18px;
            font-weight: bold;

            color: #fff0f6;

            letter-spacing: 2px;

            margin-top: 10px;

            text-shadow:
                0 0 5px #ff69b4;
        }

        /* PARTICLES */

        .particle {

            position: absolute;

            background-color: #ff69b4;

            border-radius: 50%;

            pointer-events: none;

            opacity: 0.8;

            filter: blur(1px);

            z-index: 1;

            animation: floatUp linear forwards;
        }

        @keyframes floatUp {

            from {
                transform: translateY(0);
                opacity: 0.8;
            }

            to {
                transform: translateY(-100vh);
                opacity: 0;
            }
        }

        /* BUTTON */

        .start-button {

            display: inline-block;

            margin-top: 35px;

            padding: 16px 45px;

            font-size: 24px;
            font-weight: bold;

            color: white;

            background: linear-gradient(
                135deg,
                #ff69b4,
                #ff1493
            );

            border: none;

            border-radius: 50px;

            cursor: pointer;

            text-transform: uppercase;

            letter-spacing: 2px;

            text-decoration: none;

            box-shadow:
                0 0 10px #ff69b4,
                0 0 20px #ff69b4;

            transition: 0.3s;
        }

        .start-button:hover {

            transform: scale(1.08);

            box-shadow:
                0 0 20px #ff1493,
                0 0 40px #ff1493,
                0 0 70px #ff1493;
        }

    </style>
</head>

<body>

<!-- SCROLLING TOP TEXT -->

<div class="top-scroll">

    <span>
        ✨ WELCOME TO GAMES UNLEASHED ✨ NEW GAMES ✨ COOL STUFF ✨ FAHHHH ✨ UNDERTALE IS PEAK ✨
    </span>

</div>

<div class="container">

    <h1 class="glow-text">Games Unleashed</h1>

    <p class="author-text">By Luna Murray</p>

    <p class="subtext">(Very fahhh)</p>

    <a class="start-button"
       href="https://sites.google.com/aacps.org/gamesunleashed/games"
       target="_blank">

        Games

    </a>

</div>

<script>

function createParticle() {

    const particle = document.createElement("div");

    particle.classList.add("particle");

    const size = Math.random() * 6 + 2;

    particle.style.width = size + "px";
    particle.style.height = size + "px";

    particle.style.left = Math.random() * window.innerWidth + "px";

    particle.style.top = (window.innerHeight + 10) + "px";

    const duration = Math.random() * 4 + 2;

    particle.style.animationDuration = duration + "s";

    document.body.appendChild(particle);

    setTimeout(() => {

        particle.remove();

    }, duration * 1000);
}

setInterval(createParticle, 80);

</script>

</body>
</html>
